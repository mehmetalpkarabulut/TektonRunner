apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-and-push-generic
  namespace: tekton-pipelines
spec:
  params:
    - name: source-type
      type: string
      description: "git or zip"
    - name: repo-url
      type: string
      default: ""
    - name: revision
      type: string
      default: main
    - name: project
      type: string
      description: "Harbor project name (workspace-derived, lowercase will be used)"
    - name: repo
      type: string
      description: "Harbor repository name inside the project"
    - name: registry
      type: string
      default: lenovo:8443
    - name: tag
      type: string
      default: latest
    - name: zip-url
      type: string
      default: ""
    - name: zip-username
      type: string
      default: ""
    - name: zip-password
      type: string
      default: ""
    - name: context-sub-path
      type: string
      default: ""
    - name: base-image-map
      type: string
      default: "{}"
  workspaces:
    - name: source
    - name: git-credentials
      optional: true
  steps:
    - name: prepare-git
      image: lenovo:8443/library/alpine-git:2.45.2
      script: |
        set -e
        if [ "$(params.source-type)" != "git" ]; then
          exit 0
        fi
        rm -rf /workspace/source/*
        if [ -z "$(params.repo-url)" ]; then
          echo "repo-url param is required for git"
          exit 1
        fi
        url="$(params.repo-url)"
        user=""
        token=""
        if [ -f /workspace/git-credentials/username ]; then
          user=$(cat /workspace/git-credentials/username)
        fi
        if [ -f /workspace/git-credentials/token ]; then
          token=$(cat /workspace/git-credentials/token)
        fi
        if [ -n "$user" ] && [ -n "$token" ]; then
          authed_url="${url/https:\/\//https://${user}:${token}@}"
        else
          authed_url="$url"
        fi
        ref="$(params.revision)"
        ref="${ref#refs/heads/}"
        git clone --depth 1 --branch "$ref" "$authed_url" /workspace/source
    - name: prepare-zip
      image: lenovo:8443/library/python:3.12-alpine
      script: |
        set -e
        if [ "$(params.source-type)" != "zip" ]; then
          exit 0
        fi
        if [ -z "$(params.zip-url)" ]; then
          echo "zip-url param is required for zip"
          exit 1
        fi
        echo "[prepare-zip] source=$(params.zip-url)"
        echo "[prepare-zip] downloading zip archive"
        rm -rf /workspace/source/*
        python - <<'PY'
        import base64
        import os
        import socket
        import sys
        import urllib.request
        import zipfile

        url = os.environ.get("ZIP_URL")
        user = os.environ.get("ZIP_USER")
        pw = os.environ.get("ZIP_PASS")
        timeout = int(os.environ.get("ZIP_TIMEOUT", "20"))

        req = urllib.request.Request(url)
        if user and pw:
            token = base64.b64encode(f"{user}:{pw}".encode()).decode()
            req.add_header("Authorization", f"Basic {token}")

        try:
            print(f"[prepare-zip] opening {url} timeout={timeout}s", flush=True)
            with urllib.request.urlopen(req, timeout=timeout) as r:
                data = r.read()
            print(f"[prepare-zip] downloaded {len(data)} bytes", flush=True)
        except Exception as exc:
            print(f"[prepare-zip] download failed: {exc}", file=sys.stderr, flush=True)
            if isinstance(exc, TimeoutError) or isinstance(exc, socket.timeout):
                print("[prepare-zip] request timed out while fetching zip", file=sys.stderr, flush=True)
            raise

        zip_path = "/tmp/src.zip"
        with open(zip_path, "wb") as f:
            f.write(data)

        dst = "/workspace/source"
        with zipfile.ZipFile(zip_path, "r") as z:
            z.extractall(dst)
        print(f"[prepare-zip] extracted zip into {dst}", flush=True)
        PY
        sub="$(params.context-sub-path)"
        sub="${sub#./}"
        if [ -n "$sub" ]; then
          case "$sub" in
            /*|*..*)
              echo "invalid context-sub-path: $sub"
              exit 1
              ;;
          esac
          ctx="/workspace/source/$sub"
          df="$ctx/Dockerfile"
          if [ ! -f "$df" ]; then
            echo "Dockerfile not found in context-sub-path: $df"
            exit 1
          fi
        else
          # Auto-detect Dockerfile location for backward compatibility.
          found="$(find /workspace/source -type f -name Dockerfile | head -n 2)"
          count="$(printf '%s\n' "$found" | grep -c . || true)"
          if [ "$count" -eq 0 ]; then
            echo "Dockerfile not found in zip"
            exit 1
          fi
          if [ "$count" -gt 1 ]; then
            echo "Multiple Dockerfile files found; set context-sub-path for multi-app zip"
            printf '%s\n' "$found"
            exit 1
          fi
          df="$(printf '%s\n' "$found" | head -n 1)"
          ctx="$(dirname "$df")"
        fi
        echo "$df" > /workspace/source/.dockerfile-path
        echo "$ctx" > /workspace/source/.context-path
        echo "[prepare-zip] dockerfile=$df"
        echo "[prepare-zip] context=$ctx"
      env:
        - name: ZIP_URL
          value: $(params.zip-url)
        - name: ZIP_USER
          value: $(params.zip-username)
        - name: ZIP_PASS
          value: $(params.zip-password)
        - name: ZIP_TIMEOUT
          value: "20"
    - name: create-project
      image: lenovo:8443/library/curl:8.12.1
      script: |
        set -e
        proj="$(params.project)"
        proj="$(printf '%s' "$proj" | tr '[:upper:]' '[:lower:]')"
        code=$(curl -sk -o /dev/null -w "%{http_code}" \
          -u admin:Harbor12345 \
          -H 'Content-Type: application/json' \
          -d '{"project_name":"'"$proj"'","metadata":{"public":"true"}}' \
          https://lenovo:8443/api/v2.0/projects || true)
        if [ "$code" != "201" ] && [ "$code" != "409" ]; then
          echo "Failed to create project. HTTP $code"
          exit 1
        fi
    - name: rewrite-base-images
      image: lenovo:8443/library/python:3.12-alpine
      script: |
        set -e
        python - <<'PY'
        import json
        import os
        import re

        dockerfile = "/workspace/source/Dockerfile"
        sub = os.environ.get("CONTEXT_SUB_PATH", "").lstrip("./")
        if sub:
            dockerfile = f"/workspace/source/{sub}/Dockerfile"
        if os.path.exists("/workspace/source/.dockerfile-path"):
            with open("/workspace/source/.dockerfile-path", "r", encoding="utf-8") as fh:
                dockerfile = fh.read().strip()

        raw_map = os.environ.get("BASE_IMAGE_MAP", "{}").strip() or "{}"
        mapping = json.loads(raw_map)
        if not mapping:
            print("base image rewrite skipped: empty mapping")
            raise SystemExit(0)
        if not os.path.exists(dockerfile):
            raise SystemExit(f"Dockerfile not found for rewrite: {dockerfile}")

        arg_defaults = {}
        from_re = re.compile(r'^(\s*FROM\s+)(.*)$', re.IGNORECASE)
        var_re = re.compile(r'\$(?:\{([A-Za-z_][A-Za-z0-9_]*)\}|([A-Za-z_][A-Za-z0-9_]*))')

        def expand(token: str) -> str:
            def repl(match):
                name = match.group(1) or match.group(2)
                return arg_defaults.get(name, match.group(0))
            return var_re.sub(repl, token)

        out = []
        with open(dockerfile, "r", encoding="utf-8") as fh:
            for line in fh:
                stripped = line.strip()
                upper = stripped.upper()
                if upper.startswith("ARG "):
                    body = stripped[4:].strip()
                    if "=" in body:
                        name, value = body.split("=", 1)
                        arg_defaults[name.strip()] = value.strip()
                    out.append(line)
                    continue
                match = from_re.match(line)
                if not match:
                    out.append(line)
                    continue
                prefix, rest = match.groups()
                parts = rest.strip().split()
                if not parts:
                    out.append(line)
                    continue
                idx = 0
                while idx < len(parts) and parts[idx].startswith("--"):
                    idx += 1
                if idx >= len(parts):
                    out.append(line)
                    continue
                image = parts[idx]
                resolved = expand(image)
                if "$" not in resolved and resolved in mapping:
                    parts[idx] = mapping[resolved]
                    line = prefix + " ".join(parts) + ("\n" if not line.endswith("\n") else "")
                out.append(line)

        with open(dockerfile, "w", encoding="utf-8") as fh:
            fh.writelines(out)
        PY
      env:
        - name: BASE_IMAGE_MAP
          value: $(params.base-image-map)
        - name: CONTEXT_SUB_PATH
          value: $(params.context-sub-path)
    - name: build
      image: lenovo:8443/library/kaniko-executor:debug
      script: |
        set -e
        dockerfile="/workspace/source/Dockerfile"
        context="/workspace/source"
        sub="$(params.context-sub-path)"
        sub="${sub#./}"
        if [ -n "$sub" ]; then
          case "$sub" in
            /*|*..*)
              echo "invalid context-sub-path: $sub"
              exit 1
              ;;
          esac
          dockerfile="/workspace/source/$sub/Dockerfile"
          context="/workspace/source/$sub"
          if [ ! -f "$dockerfile" ]; then
            echo "Dockerfile not found: $dockerfile"
            exit 1
          fi
        fi
        if [ -f /workspace/source/.dockerfile-path ]; then
          dockerfile="$(cat /workspace/source/.dockerfile-path)"
        fi
        if [ -f /workspace/source/.context-path ]; then
          context="$(cat /workspace/source/.context-path)"
        fi
        proj="$(params.project)"
        proj="$(printf '%s' "$proj" | tr '[:upper:]' '[:lower:]')"
        repo="$(params.repo)"
        repo="$(printf '%s' "$repo" | tr '[:upper:]' '[:lower:]')"
        if [ -z "$repo" ]; then
          echo "repo param is required"
          exit 1
        fi
        dest="$(params.registry)/${proj}/${repo}:$(params.tag)"
        /kaniko/executor \
          --dockerfile="$dockerfile" \
          --context="$context" \
          --destination="${dest}" \
          --skip-tls-verify \
          --skip-tls-verify-pull \
          --ignore-path=/product_uuid \
          --cleanup=false
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker
  volumes:
    - name: docker-config
      secret:
        secretName: harbor-creds
        items:
          - key: .dockerconfigjson
            path: config.json
